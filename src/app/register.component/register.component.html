<div class="min-h-screen bg-black flex items-center justify-center px-4">
  <div class="w-full max-w-md bg-neutral-900 border border-neutral-800 rounded-2xl p-8 shadow-2xl">
    <h2 class="text-3xl font-bold text-white text-center mb-8 tracking-wide">Register</h2>
    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-5">
      <div>
        <label for="name" class="block text-sm font-medium text-neutral-400 mb-1">Name</label>
        <input
          id="name"
          type="text"
          formControlName="name"
          placeholder="Enter your name"
          class="w-full bg-neutral-800 text-white placeholder-neutral-500 border border-neutral-700 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-white focus:border-transparent transition"
        />
      </div>
      <div>
        <label for="email" class="block text-sm font-medium text-neutral-400 mb-1">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="Enter your email"
          class="w-full bg-neutral-800 text-white placeholder-neutral-500 border border-neutral-700 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-white focus:border-transparent transition"
        />
      </div>
      <div>
        <label for="password" class="block text-sm font-medium text-neutral-400 mb-1">Password</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="Enter your password"
          class="w-full bg-neutral-800 text-white placeholder-neutral-500 border border-neutral-700 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-white focus:border-transparent transition"
        />
      </div>
      <button
        type="submit"
        [disabled]="registerForm.invalid"
        class="w-full bg-white text-black font-semibold py-3 rounded-lg hover:bg-neutral-200 disabled:opacity-40 disabled:cursor-not-allowed transition"
      >
        Register
      </button>
    </form>
  </div>
</div>
